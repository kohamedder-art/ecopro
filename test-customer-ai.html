<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer AI Test — Sahla4Eco</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f0f0f; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; }
.header { background:#1a1a2e; padding:16px 20px; border-bottom:1px solid #333; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:18px; color:#a78bfa; }
.header-row { display:flex; gap:12px; align-items:center; }
.header input { background:#222; border:1px solid #444; color:#fff; padding:6px 12px; border-radius:8px; font-size:13px; width:120px; }
.header label { font-size:12px; color:#888; }
.chat { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
.msg { max-width:80%; padding:10px 16px; border-radius:16px; font-size:14px; line-height:1.6; white-space:pre-wrap; word-wrap:break-word; }
.msg.customer { background:#7c3aed; color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
.msg.ai { background:#1e293b; color:#e2e8f0; align-self:flex-start; border-bottom-left-radius:4px; border:1px solid #334155; }
.msg.system { background:#1a1a1a; color:#888; align-self:center; font-size:12px; font-style:italic; padding:8px 16px; }
.input-row { display:flex; gap:10px; padding:16px 20px; background:#1a1a2e; border-top:1px solid #333; }
.input-row input { flex:1; background:#222; border:1px solid #444; color:#fff; padding:12px 16px; border-radius:12px; font-size:14px; direction:rtl; }
.input-row input:focus { outline:none; border-color:#7c3aed; }
.btn { background:#7c3aed; color:#fff; border:none; padding:12px 20px; border-radius:12px; font-size:14px; cursor:pointer; font-weight:bold; }
.btn:hover { background:#6d28d9; }
.btn:disabled { background:#444; cursor:not-allowed; }
.btn-sm { padding:8px 14px; font-size:12px; border-radius:8px; }
.copy-btn { background:#334155; color:#94a3b8; }
.copy-btn:hover { background:#475569; color:#fff; }
.tools { display:flex; gap:8px; padding:0 20px 12px; background:#1a1a2e; }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 Customer AI Tester</h1>
  <div class="header-row">
    <div><label>Store ID</label><br><input type="number" id="clientId" value="20" /></div>
    <div><label>Chat ID</label><br><input type="text" id="chatId" value="gemini_test" /></div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="tools">
  <button class="btn btn-sm copy-btn" onclick="copyChat()">📋 Copy for Gemini</button>
  <button class="btn btn-sm copy-btn" onclick="clearChat()">🗑 Clear</button>
</div>

<div class="input-row">
  <input type="text" id="msgInput" placeholder="اكتب رسالة كأنك زبون..." />
  <button id="sendBtn" class="btn" onclick="send()">إرسال</button>
</div>

<script>
const API = 'https://ecopro.onrender.com/api/ai/test-customer';
const chat = document.getElementById('chat');
const input = document.getElementById('msgInput');
const chatIdEl = document.getElementById('chatId');
const clientIdEl = document.getElementById('clientId');
const messages = [];

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  messages.push({ role, text });
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg('customer', text);
  document.getElementById('sendBtn').disabled = true;

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        clientId: Number(clientIdEl.value),
        chatId: chatIdEl.value
      })
    });
    const data = await res.json();
    addMsg('ai', data.answer || JSON.stringify(data));
  } catch (e) {
    addMsg('ai', 'Error: ' + e.message);
  } finally {
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

function copyChat() {
  const lines = messages
    .filter(m => m.role !== 'system')
    .map(m => (m.role === 'customer' ? 'Customer: ' : 'AI: ') + m.text)
    .join('\n\n');
  navigator.clipboard.writeText(lines).then(() => {
    const btn = document.querySelector('.copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function clearChat() {
  chat.innerHTML = '';
  messages.length = 0;
  addMsg('system', 'Send a message as a customer. The AI responds using your real store data.');
}

addMsg('system', 'Type a message as a customer. The AI responds using your real store data. Copy the conversation and paste into Gemini for analysis.');
</script>
</body>
</html>
