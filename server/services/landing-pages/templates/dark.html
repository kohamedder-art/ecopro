<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: {{bg_color}};
    color: #fff;
    width: 1080px;
    overflow: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    height: 520px;
    background: linear-gradient(135deg, {{primary_color}}dd 0%, {{secondary_color}}dd 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('{{hero_image}}') center/cover;
    opacity: 0.35;
    filter: blur(2px);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 40px;
  }
  .hero-badge {
    display: inline-block;
    background: {{accent_color}};
    color: #fff;
    padding: 8px 28px;
    border-radius: 30px;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
  }
  .hero-title {
    font-size: 52px;
    font-weight: 900;
    line-height: 1.3;
    text-shadow: 0 4px 20px rgba(0,0,0,0.4);
    max-width: 800px;
    margin: 0 auto;
  }
  .hero-subtitle {
    font-size: 22px;
    font-weight: 600;
    margin-top: 16px;
    opacity: 0.9;
  }

  /* TRUST BAR */
  .trust-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    background: {{primary_color}}22;
    border-bottom: 1px solid {{primary_color}}44;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 18px;
    font-weight: 600;
    color: {{accent_color}};
  }
  .trust-icon {
    width: 28px;
    height: 28px;
    background: {{accent_color}};
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* PRODUCT SHOWCASE */
  .product-showcase {
    display: flex;
    align-items: center;
    gap: 50px;
    padding: 60px 80px;
    background: {{bg_color}};
  }
  .product-image-wrapper {
    flex: 0 0 400px;
    height: 400px;
    border-radius: 24px;
    overflow: hidden;
    background: linear-gradient(135deg, {{primary_color}}33, {{secondary_color}}33);
    border: 2px solid {{primary_color}}44;
  }
  .product-image-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .product-info {
    flex: 1;
  }
  .product-info h2 {
    font-size: 36px;
    font-weight: 800;
    color: {{accent_color}};
    margin-bottom: 16px;
  }
  .product-info p {
    font-size: 20px;
    line-height: 1.8;
    color: #ccc;
  }

  /* FEATURES GRID */
  .features {
    padding: 60px 80px;
    background: linear-gradient(180deg, {{primary_color}}11, {{bg_color}});
  }
  .features h2 {
    text-align: center;
    font-size: 36px;
    font-weight: 800;
    color: {{accent_color}};
    margin-bottom: 40px;
  }
  .features-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .feature-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: {{primary_color}}22;
    border-radius: 16px;
    border: 1px solid {{primary_color}}44;
  }
  .feature-icon {
    width: 50px;
    height: 50px;
    background: {{accent_color}}22;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .feature-text {
    font-size: 18px;
    font-weight: 600;
    color: #ddd;
  }

  /* CTA */
  .cta {
    padding: 60px 80px;
    background: linear-gradient(135deg, {{primary_color}}, {{secondary_color}});
    text-align: center;
  }
  .cta-label {
    font-size: 22px;
    font-weight: 600;
    opacity: 0.9;
    margin-bottom: 12px;
  }
  .cta-price {
    font-size: 64px;
    font-weight: 900;
    color: {{accent_color}};
    text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .cta-currency {
    font-size: 28px;
    font-weight: 600;
    opacity: 0.8;
  }
  .cta-button {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    padding: 18px 48px;
    background: {{accent_color}};
    color: #fff;
    border-radius: 16px;
    font-size: 24px;
    font-weight: 800;
    text-decoration: none;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  /* FOOTER */
  .footer {
    display: flex;
    justify-content: center;
    gap: 40px;
    padding: 20px;
    background: {{bg_color}};
    border-top: 1px solid {{primary_color}}44;
  }
  .footer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    color: #888;
  }
  .footer-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: {{accent_color}};
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-badge">{{badge_text}}</div>
    <h1 class="hero-title">{{headline}}</h1>
    <p class="hero-subtitle">{{subheadline}}</p>
  </div>
</div>

<!-- TRUST BAR -->
<div class="trust-bar">
  {{#trust_items}}
  <div class="trust-item">
    <div class="trust-icon">✓</div>
    <span>{{.}}</span>
  </div>
  {{/trust_items}}
</div>

<!-- PRODUCT SHOWCASE -->
<div class="product-showcase">
  <div class="product-image-wrapper">
    <img src="{{product_image}}" alt="{{product_name}}">
  </div>
  <div class="product-info">
    <h2>{{product_name}}</h2>
    <p>{{product_description}}</p>
  </div>
</div>

<!-- FEATURES -->
<div class="features">
  <h2>{{features_title}}</h2>
  <div class="features-grid">
    {{#features}}
    <div class="feature-card">
      <div class="feature-icon">{{icon}}</div>
      <div class="feature-text">{{text}}</div>
    </div>
    {{/features}}
  </div>
</div>

<!-- CTA -->
<div class="cta">
  <div class="cta-label">{{cta_label}}</div>
  <div class="cta-price">{{price}} <span class="cta-currency">{{currency}}</span></div>
  <a class="cta-button" href="tel:{{phone}}">
    📞 {{cta_button}}
  </a>
</div>

<!-- FOOTER -->
<div class="footer">
  {{#footer_items}}
  <div class="footer-item">
    <div class="footer-dot"></div>
    <span>{{.}}</span>
  </div>
  {{/footer_items}}
</div>

</body>
</html>
